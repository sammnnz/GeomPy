name: Tests-ub-win

on:
   push:
     branches: [main, release-*, te-*]
   pull_request:
     branches: [main, release-*, develop, fe-*]
     types: [ opened, reopened ]
   workflow_call:
     inputs:
       ref:
         required: true
         type: string

jobs:
  pre:
    runs-on: ubuntu-latest
    steps:
      - id: ref
        run: |
          if [ ${{inputs.ref}} == '' ]; then
            echo "value=${{github.ref_name}}" >> $GITHUB_OUTPUT
          else
            echo "value=${{inputs.ref}}" >> $GITHUB_OUTPUT
          fi
        shell: bash

    outputs:
      ref: ${{ steps.ref.outputs.value }}

  test:
    needs: pre
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        py: [3.7, 3.8, 3.9, "3.10"]
        exclude:
          - os: ubuntu-latest
            py: "3.7"
        include:
          - os: ubuntu-22.04
            py: "3.7.17"
          - os: windows-latest
            py: "3.9"
            lint: "true"
            typecheck: "true"
    uses: ./.github/workflows/tests.yml
    with:
        os: ${{matrix.os}}
        py: ${{matrix.py}}
        lint: ${{matrix.lint}}
        typecheck: ${{matrix.typecheck}}
        ref: ${{needs.pre.outputs.ref}}
