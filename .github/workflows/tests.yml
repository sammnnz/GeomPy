name: Tests

on:
   workflow_call:
     inputs:
       ref:
         required: false
         type: string
         default: ${{github.ref_name}}
       os:
         required: true
         type: string
       py:
         required: true
         type: string
       lint:
         required: false
         type: string
         default: ''
       typecheck:
         required: false
         type: string
         default: ''
     secrets:
       token:
         required: true
       # https://giters.com/codecov/codecov-action/issues/1738
       codecov_token:
         required: false

jobs:
  test:
    continue-on-error: true
    runs-on: ${{inputs.os}}
    steps:
      - uses: actions/checkout@v3
        with:
          repository: sammnnz/geompy
          ref: ${{inputs.ref}}
      - name: Setup Python ${{inputs.py}}
        uses: actions/setup-python@v2
        with:
          python-version: ${{inputs.py}}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[testing,linting,typechecking]
      #- name: Download coverage artefact
      #  continue-on-error: true
      #  uses: actions/download-artifact@v4.1.8
      #  with:
      #    github-token: ${{ secrets.GITHUB_TOKEN }}
      #    merge-multiple: true
      #    name: geompy-cov
      #    path: .coverage
      - name: Test with pytest
        run: |
          pytest --cov-config=.coveragerc --cov-append --cov-report xml:coverage-${{inputs.os}}-py${{inputs.py}}.xml --verbose --color=yes --assert=plain
      #- name: Upload test results to Codecov
      #  if: ${{ !cancelled() }}
      #  uses: codecov/test-results-action@v1
      #  with:
      #    file: ./junit.xml
      #    flags: python${{inputs.py}}
      #    name: geompy-${{inputs.os}}-${{inputs.py}}
      #    token: ${{ secrets.codecov_token }}
      #- name: Upload coverage to Codecov
      #  uses: codecov/codecov-action@v4
      #  with:
      #    fail_ci_if_error: true
      #    file: ./coverage.xml
      #    flags: ${{inputs.py}}
      #    name: geompy-${{inputs.os}}-py${{inputs.py}}
      #    # https://docs.codecov.com/docs/commit-status#disabling-a-status
      #    token: ${{ secrets.codecov_token }}
      #    verbose: true
      - name: Upload coverage artefact
        uses: actions/upload-artifact@v4
        with:
          name: geompy-cov-${{inputs.os}}-py${{inputs.py}}
          overwrite: true
          path: ./coverage-${{inputs.os}}-py${{inputs.py}}.xml
          # .coverage/coverage.-1
      - name: Linter
        if: ${{inputs.lint}}
        run: |
          flake8 src tests
      - name: Type-checker
        if: ${{inputs.typecheck}}
        run: |
          mypy src