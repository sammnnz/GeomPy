name: Tests (single OS and single PY)

on:
   workflow_dispatch:
     inputs:
       os:
         required: true
         type: choice
         default: 'windows-latest'
         options:
         # https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#standard-github-hosted-runners-for-public-repositories
         - ubuntu-latest
         - ubuntu-24.04
         - ubuntu-22.04
         - ubuntu-20.04
         - windows-latest
         - windows-2025
         - windows-2022
         - windows-2019
         - ubuntu-24.04-arm
         - ubuntu-22.04-arm
         - macos-13
         - macos-latest
         - macos-14
         - macos-15
       py:
         required: true
         type: choice
         default: '3.9'
         options:
         - '3.7'
         - '3.8'
         - '3.9'
         - '3.10'
       lint:
         required: false
         type: choice
         default: 'false'
         options:
         - 'true'
         - 'false'
       typecheck:
         required: false
         type: choice
         default: 'false'
         options:
         - 'true'
         - 'false'
       codecov:
         required: false
         type: choice
         default: 'false'
         options:
           - 'true'
           - 'false'

jobs:
  pre:
   runs-on: ubuntu-latest
   steps:
      - id: lint
        run: |
             if [ ${{inputs.lint}} == 'true' ]; then
               echo "value=true" >> $GITHUB_OUTPUT
             elif [ ${{inputs.lint}} == 'false' ]; then
               echo "value=" >> $GITHUB_OUTPUT
             else
               echo "Invalid argument: lint must be true or false."
               exit 1
             fi
        shell: bash
      - id: typecheck
        run: |
             if [ ${{inputs.typecheck}} == 'true' ]; then
               echo "value=true" >> $GITHUB_OUTPUT
             elif [ ${{inputs.typecheck}} == 'false' ]; then
               echo "value=" >> $GITHUB_OUTPUT
             else
               echo "Invalid argument: lint must be true or false."
               exit 1
             fi
        shell: bash

   outputs:
      lint: ${{ steps.lint.outputs.value }}
      typecheck: ${{ steps.typecheck.outputs.value }}

  tests-call:
     needs: pre
     uses: ./.github/workflows/tests.yml
     with:
       os: ${{inputs.os}}
       py: ${{inputs.py}}
       lint: ${{needs.pre.outputs.lint}}
       typecheck: ${{needs.pre.outputs.typecheck}}
     secrets:
       token: ${{secrets.GITHUB_TOKEN}}

  codecov-deploy:
    runs-on: ubuntu-latest
    needs: tests-call
    if: ${{ inputs.codecov }}
    steps:
      - name: Download coverage artefact
        uses: actions/download-artifact@v4.1.8
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-multiple: true
          path: .temp
          pattern: geompy-cov-*
      - name: Rename coverage data files (for combine)
        run: |
          find .temp -type f
          echo "---------"
          for file in .temp/*; do
              echo "$file"
              mv .temp/${file:6} .temp/.${file:6}
          done
          echo "---------"
          find .temp -type f
        shell: bash
      - name: Setup Python 3.10
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage==7.2.7
      - name: Combine coverage data files
        run: |
          pwd
          find .temp
          cd ${{ github.workspace }}/.temp/
          find -type f
          coverage combine
          find -type f
          coverage xml
          find -type f

