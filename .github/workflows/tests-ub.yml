name: Tests-ub

on:
   pull_request:
     branches: [main, release-*, develop, fe-*]
     types: [opened, reopened]
   workflow_dispatch:

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        py: [3.7, "3.9"]
        codecov: [true]
        cov-json: [true]
        exclude:
          - os: ubuntu-latest
            py: "3.7"
            codecov: "true"
            cov-json: "true"
        include:
          - os: ubuntu-22.04
            py: "3.7.17"
            codecov: "true"
            cov-json: "true"
          - os: ubuntu-latest
            py: "3.9"
            lint: "true"
            typecheck: "true"
            codecov: "true"
            cov-json: "true"
    uses: ./.github/workflows/tests.yml
    with:
        os: ${{matrix.os}}
        py: ${{matrix.py}}
        lint: ${{matrix.lint}}
        typecheck: ${{matrix.typecheck}}
        codecov: ${{matrix.codecov}}
        cov-json: ${{matrix.cov-json}}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  coverage-badge:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Download coverage artefact
        uses: actions/download-artifact@v4.1.8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-multiple: true
          path: .temp
          pattern: geompy-cov-*
      - name: Print artefact
        run: |
          for file in `find .temp -type f`; do
            echo "$file"
          done

